sonar.projectKey=coti-io_coti-contracts
sonar.organization=coti-io

# Exclude test files from copy-paste detection (duplication analysis).
# Integration tests are inherently repetitive; enforcing DRY on them
# reduces readability without improving production code quality.
sonar.cpd.exclusions=test/**/*,test/**/*.cjs,test/**/*.js,test/**/*.ts

# Exclude test files from duplication quality gate on new code
sonar.coverage.exclusions=test/**/*
sonar.duplications.exclusions=test/**/*
